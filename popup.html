<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deribit APR Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #f7931a, #ff9500);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: #fff;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #252540;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      transition: 0.3s;
      border-radius: 26px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: linear-gradient(135deg, #f7931a, #ff9500);
    }

    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }

    .info-card {
      background: #252540;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .info-label {
      color: #888;
      font-size: 12px;
    }

    .info-value {
      font-weight: 600;
      font-size: 13px;
    }

    .info-value.btc-price {
      color: #f7931a;
    }

    .info-value.eth-price {
      color: #627eea;
    }

    .formula-box {
      background: #1e1e32;
      border-radius: 6px;
      padding: 10px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      color: #aaa;
      line-height: 1.5;
    }

    .formula-box .highlight {
      color: #f7931a;
    }

    .formula-box .call-highlight {
      color: #4ade80;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #333;
      text-align: center;
      font-size: 11px;
      color: #666;
    }

    .footer a {
      color: #f7931a;
      text-decoration: none;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px;
      background: #252540;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    .status-dot.inactive {
      background: #666;
      animation: none;
    }

    .status-dot.disabled {
      background: #f87171;
      animation: none;
    }

    .status-text {
      font-size: 12px;
      color: #888;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .legend {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .legend-color.put {
      background: #e3f2fd;
    }

    .legend-color.call {
      background: #fff3e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">APR</div>
      <div class="title">Deribit APR Calculator</div>
    </div>

    <div class="section">
      <div class="toggle-container">
        <span class="toggle-label">Show APR</span>
        <label class="toggle-switch">
          <input type="checkbox" id="aprToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Checking page...</div>
    </div>

    <div class="section">
      <div class="section-title">Current Price</div>
      <div class="info-card">
        <div class="info-row">
          <span class="info-label">BTC Price</span>
          <span class="info-value btc-price" id="btcPrice">Loading...</span>
        </div>
        <div class="info-row">
          <span class="info-label">ETH Price</span>
          <span class="info-value eth-price" id="ethPrice">Loading...</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">APR Formula</div>
      <div class="formula-box" id="formulaBox">
        <span class="highlight">Put APR</span> = (Premium / Strike) × (365 / Days) × 100%<br>
        <span class="call-highlight">Call APR</span> = (Premium / Spot) × (365 / Days) × 100%
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-color put"></div>
          <span>Put</span>
        </div>
        <div class="legend-item">
          <div class="legend-color call"></div>
          <span>Call</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="https://www.deribit.com" target="_blank">Open Deribit</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
